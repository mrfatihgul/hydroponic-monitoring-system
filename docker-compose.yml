services:
  backend:
    build:
      context: ./backend
    container_name: ttk-backend
    ports:
      - "8080:8080"
    environment:
      SPRING_PROFILES_ACTIVE: docker

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_BASE_URL: /api
    container_name: ttk-frontend
    ports:
      - "8081:80"
    depends_on:
      - backend
